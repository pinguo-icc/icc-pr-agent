# PR Review 配置文件
# 包含文件排除规则和 prompt 模板

# ============================================================
# 文件排除配置
# 匹配的文件将跳过 AI 审查，支持 glob 模式
# ============================================================
exclude:
  # 依赖锁文件
  - "*.lock"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "go.sum"
  - "Pipfile.lock"
  - "poetry.lock"
  - "composer.lock"
  - "Gemfile.lock"
  - "Cargo.lock"

  # 图片和媒体
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.svg"
  - "*.ico"
  - "*.bmp"
  - "*.webp"
  - "*.mp4"
  - "*.mp3"

  # 字体
  - "*.woff"
  - "*.woff2"
  - "*.ttf"
  - "*.eot"
  - "*.otf"

  # 编译产物和压缩文件
  - "*.min.js"
  - "*.min.css"
  - "*.map"
  - "*.bundle.js"
  - "*.chunk.js"
  - "*.pyc"
  - "*.class"
  - "*.o"
  - "*.so"
  - "*.dll"
  - "*.exe"
  - "*.jar"
  - "*.war"
  - "*.zip"
  - "*.tar.gz"
  - "*.wasm"

  # 自动生成的代码
  - "*.pb.go"
  - "*.pb.gw.go"
  - "*_generated.go"
  - "*_gen.go"
  - "*.generated.ts"
  - "*.swagger.json"
  - "*.openapi.json"

  # 文档和配置
  - "*.md"
  - "LICENSE"
  - "LICENSE.*"
  - ".gitignore"
  - ".gitattributes"
  - ".editorconfig"
  - ".prettierrc"
  - ".eslintignore"

  # IDE 和编辑器
  - ".idea/**"
  - ".vscode/**"
  - "*.iml"

  # 目录级排除
  - "vendor/**"
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - "__pycache__/**"
  - ".next/**"
  - "coverage/**"
  - "third_party/**"

  # 测试快照和 fixtures
  - "**/__snapshots__/**"
  - "**/testdata/**"
  - "**/fixtures/**"

# ============================================================
# Prompt 模板配置
# 支持变量: {title}, {description}, {source_branch},
#           {target_branch}, {diff}, {summaries}
# ============================================================
prompts:
  system_prompt: >
    你是一位资深代码审查专家。请根据你掌握的技能，对代码变更进行专业审查，
    严格按照 JSON 格式输出结果。

  review_user_prompt: |
    请对以下 Pull Request 的代码变更进行审查。

    ## PR 信息
    - 标题: {title}
    - 描述: {description}
    - 源分支: {source_branch}
    - 目标分支: {target_branch}

    ## 代码变更 (Diff)
    ```
    {diff}
    ```

    请使用你认为合适的技能进行审查，严格按照以下 JSON 格式输出结果，不要包含其他内容：
    {{
      "summary": "审查总结（一段简短的总体评价）",
      "issues": [
        {{
          "file_path": "文件路径",
          "line_number": 行号或null,
          "severity": "critical|warning|suggestion",
          "category": "quality|bug|security|improvement",
          "description": "问题描述",
          "suggestion": "改进建议或null"
        }}
      ]
    }}

  summary_user_prompt: |
    以下是对一个 Pull Request 中多个文件分别审查后的结果摘要列表。
    请将它们合并为一段简洁的总体审查总结（2-3 句话）。

    各文件审查摘要：
    {summaries}

    请只输出总结文本，不要输出 JSON 或其他格式。

# ============================================================
# 文件分组配置（子 Agent 架构）
# 有序字典，键为分组名称，值为 glob 模式列表
# 匹配规则：先匹配先分配（first-match wins）
# 未匹配任何分组的文件自动归入 "default" 分组
# 支持 glob 语法：*（匹配文件名中任意字符）、**（匹配任意层级目录）、?（匹配单个字符）
# ============================================================
file_groups:
  # 后端服务代码（Go + Proto + 配置）
  backend:
    - "*.go"
    - "*.proto"
    - "configs/**"
  # 前端代码（TypeScript/JavaScript + 样式）
  frontend:
    - "*.ts"
    - "*.tsx"
    - "*.js"
    - "*.jsx"
    - "*.vue"
    - "*.css"
    - "*.less"
    - "*.scss"
  # 基础设施和 CI/CD 配置
  infra:
    - "Dockerfile*"
    - "Makefile"
    - "*.yml"
    - "*.yaml"
  # 注意：default 组不需要显式配置，未匹配的文件自动归入

# ============================================================
# 子 Agent 审查参数配置
# ============================================================

# 单个审查批次的最大字符数（覆盖自动探测值）
# 未设置时系统将自动探测模型 context window 并取 70% 作为可用额度
# 自动探测失败时使用默认值 20000
# max_chunk_chars: 25000

# 每次审查最多输出的问题数量（默认 10）
# 超出时按 severity 优先级截断（critical > warning > suggestion）
# 可通过环境变量 MAX_REVIEW_ISSUES 覆盖
max_issues: 10

# 子 Agent 最大并发数（默认 3）
# 控制同时调用 LLM API 的子 Agent 数量，避免触发 rate limit
# 可通过环境变量 MAX_REVIEW_CONCURRENCY 覆盖
max_concurrency: 3

# 单个子 Agent 审查超时时间（秒，默认 300）
# 超时后自动终止该子 Agent 并继续处理其他分组
# 可通过环境变量 REVIEW_TIMEOUT 覆盖
review_timeout: 300

# ============================================================
# Token 预算熔断配置
# ============================================================

# 单次 PR 审查的 token 预算上限（默认 0 = 不限制）
# 当累计 token 消耗达到此值时，立即停止后续审查批次
# 已完成的审查结果会正常输出，summary 中会标注熔断信息
# 可通过环境变量 TOKEN_BUDGET 覆盖
# token_budget: 100000
